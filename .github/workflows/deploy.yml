name: Deploy to Server

on:
  push:
    branches: [ master ] 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/incident-project
            git pull origin master
            ./gradlew :common:build
            ./gradlew :incedent-service:bootJar
            ./gradlew :incedent-producer-service:bootJar
            ./gradlew :incedent-processor:bootJar
            ./gradlew :alert-service:bootJar
            ./gradlew :ping-service:bootJar
            cd ~/incident-project/incedent-service && docker compose up -d --build
            cd ~/incident-project/incedent-producer-service && docker compose up -d --build
            cd ~/incident-project/incedent-processor && docker compose up -d --build
            cd ~/incident-project/alert-service && docker compose up -d --build
            cd ~/incident-project/ping-service && docker compose up -d --build
            echo "Deploy completed!"
