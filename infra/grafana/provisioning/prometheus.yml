global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  # Для локальной разработки — сервисы запущены на хосте из IDE
  - job_name: 'incedent-project-local'
    static_configs:
      - targets:
          - 'host.docker.internal:8079'   # incident-service
          - 'host.docker.internal:8082'   # incident-producer-service
          - 'host.docker.internal:8086'   # incident-processor
          - 'host.docker.internal:9091'   # ping-service
        labels:
          application: 'incident-project'
          environment: 'development'
    metrics_path: /actuator/prometheus  # FIX: явно указываем путь

  # FIX: добавлен job для Docker-окружения — когда все сервисы в контейнерах
  - job_name: 'incedent-project-docker'
    static_configs:
      - targets:
          - 'incedent-service:8079'          # incident-service
          - 'incedent-producer-service:8082' # incident-producer-service
          - 'incedent-processor:8086'        # incident-processor
          - 'ping-service:9091'              # ping-service
        labels:
          application: 'incident-project'
          environment: 'docker'
    metrics_path: /actuator/prometheus  # FIX: явно указываем путь
