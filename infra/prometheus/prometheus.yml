# Конфигурация Prometheus
# Этот файл определяет, какие метрики собирать и откуда

global:
  # Как часто собирать метрики
  scrape_interval: 15s
  # Таймаут для сбора метрик
  scrape_timeout: 10s
  # Как часто вычислять правила (если есть)
  evaluation_interval: 15s

# Конфигурация для сбора метрик
scrape_configs:
  # Имя job'а для идентификации источника метрик
  - job_name: 'incedent-project-metrics'
    # URL для сбора метрик (endpoint /actuator/prometheus)
    static_configs:
      - targets:
          - 'host.docker.internal:8079'   # incident-service
          - 'host.docker.internal:8082'   # incident-producer-service
          - 'host.docker.internal:8086'   # incident-processor
          - 'host.docker.internal:9091'   # ping-service
#          - 'host.docker.internal:8081'   # kafka
#          - 'host.docker.internal:3000'   # grafana
#          - 'host.docker.internal:5432'   # postgresql
        labels:
          application: 'incident-project'
          environment: 'development'