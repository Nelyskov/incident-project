services:
  incident-service:
    build: .
    container_name: incident-service
    ports:
      - "8079:8079"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    networks:
      - app-network  # ДОЛЖНА быть external сеть из infra

networks:
  app-network:
    external: true
    name: app-network  # Уточняем полное имя сети